## Docker Compose for Qubic Explorer using pre-built container images.
## Copy this file and adjust image tags / environment to your needs.
##
##   docker compose -f docker-compose.prebuilt.yml up -d
##

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: qubic-clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/clickhouse/disable-system-logs.xml:/etc/clickhouse-server/config.d/disable-system-logs.xml:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=qubic
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    image: qubicli/qubic-explorer-indexer:latest
    container_name: qubic-indexer
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - Bob__Nodes__0=https://bobnet.qubic.li
      - ClickHouse__Host=clickhouse
      - ClickHouse__Port=8123
      - ClickHouse__Database=qubic
      - Indexer__StartTick=0
      - Indexer__StartFromLatest=false
      - Indexer__BatchSize=1000
      - Indexer__FlushIntervalMs=1000
    restart: unless-stopped

  analytics:
    image: qubicli/qubic-explorer-analytics:latest
    container_name: qubic-analytics
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - ClickHouse__Host=clickhouse
      - ClickHouse__Port=8123
      - ClickHouse__Database=qubic
      - Bob__Nodes__0=https://bobnet.qubic.li
    restart: unless-stopped

  pruner:
    image: qubicli/qubic-explorer-pruner:latest
    container_name: qubic-pruner
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - ClickHouse__Host=clickhouse
      - ClickHouse__Port=8123
      - ClickHouse__Database=qubic
      - Pruner__DryRun=true
      - Pruner__IntervalMinutes=60
    restart: unless-stopped

  api:
    image: qubicli/qubic-explorer-api:latest
    container_name: qubic-api
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ClickHouse__Host=clickhouse
      - ClickHouse__Port=8123
      - ClickHouse__Database=qubic
      - Bob__Nodes__0=https://bobnet.qubic.li
    restart: unless-stopped

  frontend:
    image: qubicli/qubic-explorer-frontend:latest
    container_name: qubic-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_API_URL=http://api:8080
      - NUXT_PUBLIC_API_URL=
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: qubic-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  clickhouse_data:
