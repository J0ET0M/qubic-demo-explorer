openapi: 3.0.3
info:
  title: Qubic Explorer API
  description: API for exploring the Qubic network — transactions, addresses, epochs, smart contracts, analytics, and more.
  version: 1.0.0

servers:
  - url: /

paths:
  # ── Search ──────────────────────────────────────────────────────────────
  /api/search:
    get:
      tags: [Search]
      summary: Search for addresses, transactions, ticks, or assets
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }

  # ── Transactions ────────────────────────────────────────────────────────
  /api/transactions:
    get:
      tags: [Transactions]
      summary: List transactions with filters
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: address
          in: query
          schema: { type: string }
          description: Filter by sender or receiver address
        - name: direction
          in: query
          schema: { type: string, enum: [from, to] }
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64 }
        - name: executed
          in: query
          schema: { type: boolean }
        - name: inputType
          in: query
          schema: { type: integer }
          description: Filter by input type (core) or procedure ID (contract)
        - name: toAddress
          in: query
          schema: { type: string }
          description: Filter by destination address (e.g. smart contract address)
        - name: coreOnly
          in: query
          schema: { type: boolean, default: false }
          description: Only return core transactions (to_address = burn address)
        - name: detailed
          in: query
          schema: { type: boolean, default: false }
          description: When true, returns full TransactionDetailDto with inputData, parsedInput, and logs
      responses:
        '200':
          description: Paginated transactions (items are TransactionDetailDto when detailed=true)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTransactionResponse' }

  /api/transactions/{hash}:
    get:
      tags: [Transactions]
      summary: Get transaction by hash
      parameters:
        - name: hash
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Transaction detail (or special transaction)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TransactionDetailDto'
                  - $ref: '#/components/schemas/SpecialTransactionDto'
        '404':
          description: Transaction not found

  # ── Transfers ───────────────────────────────────────────────────────────
  /api/transfers:
    get:
      tags: [Transfers]
      summary: List transfers / logs with filters
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: fromAddress
          in: query
          schema: { type: string }
        - name: toAddress
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: integer }
          description: Single log type filter
        - name: types
          in: query
          schema: { type: string }
          description: Comma-separated log type IDs
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64 }
        - name: epoch
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Paginated transfers
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTransferResponse' }

  # ── Ticks ───────────────────────────────────────────────────────────────
  /api/ticks:
    get:
      tags: [Ticks]
      summary: List ticks
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated ticks
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTickResponse' }

  /api/ticks/{tickNumber}:
    get:
      tags: [Ticks]
      summary: Get tick details
      parameters:
        - name: tickNumber
          in: path
          required: true
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Tick detail with transactions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TickDetailDto' }
        '404':
          description: Tick not found

  /api/ticks/{tickNumber}/transactions:
    get:
      tags: [Ticks]
      summary: List transactions in a tick
      parameters:
        - name: tickNumber
          in: path
          required: true
          schema: { type: integer, format: uint64 }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: address
          in: query
          schema: { type: string }
        - name: direction
          in: query
          schema: { type: string, enum: [from, to] }
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64 }
        - name: executed
          in: query
          schema: { type: boolean }
        - name: inputType
          in: query
          schema: { type: integer }
        - name: toAddress
          in: query
          schema: { type: string }
        - name: coreOnly
          in: query
          schema: { type: boolean, default: false }
        - name: detailed
          in: query
          schema: { type: boolean, default: false }
          description: When true, returns full TransactionDetailDto with inputData, parsedInput, and logs
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTransactionResponse' }

  /api/ticks/{tickNumber}/logs:
    get:
      tags: [Ticks]
      summary: List logs / transfers in a tick
      parameters:
        - name: tickNumber
          in: path
          required: true
          schema: { type: integer, format: uint64 }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: fromAddress
          in: query
          schema: { type: string }
        - name: toAddress
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: integer }
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64 }
      responses:
        '200':
          description: Paginated logs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTransferResponse' }

  # ── Address ─────────────────────────────────────────────────────────────
  /api/address/{address}:
    get:
      tags: [Address]
      summary: Get address summary
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Address info
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressDto' }

  /api/address/{address}/transactions:
    get:
      tags: [Address]
      summary: Get address transactions
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: direction
          in: query
          schema: { type: string, enum: [from, to] }
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64 }
        - name: executed
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTransactionResponse' }

  /api/address/{address}/transfers:
    get:
      tags: [Address]
      summary: Get address transfers
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: type
          in: query
          schema: { type: integer }
        - name: fromAddress
          in: query
          schema: { type: string }
        - name: toAddress
          in: query
          schema: { type: string }
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64 }
        - name: epoch
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Paginated transfers
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTransferResponse' }

  /api/address/{address}/rewards:
    get:
      tags: [Address]
      summary: Get address rewards
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated rewards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRewardDistributionResponse'

  /api/address/{address}/activity-range:
    get:
      tags: [Address]
      summary: Get first/last activity for an address
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Activity range
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressActivityRangeDto' }

  /api/address/{address}/export:
    get:
      tags: [Address]
      summary: Export address data as CSV
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: format
          in: query
          schema: { type: string, default: csv }
        - name: type
          in: query
          schema: { type: string, default: transfers, enum: [transfers] }
        - name: epoch
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema: { type: string }

  /api/address/{address}/flow:
    get:
      tags: [Address]
      summary: Get address transaction flows
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Flow data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressFlowDto' }

  /api/address/{address}/graph:
    get:
      tags: [Address]
      summary: Get transaction graph for visualization
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: hops
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Graph data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionGraphDto' }

  /api/address/batch:
    post:
      tags: [Address]
      summary: Batch fetch multiple addresses (max 20)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchAddressRequest' }
      responses:
        '200':
          description: Array of address info
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AddressDto' }

  # ── Epochs ──────────────────────────────────────────────────────────────
  /api/epoch:
    get:
      tags: [Epochs]
      summary: List epochs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Epoch summaries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EpochSummaryDto' }

  /api/epoch/countdown:
    get:
      tags: [Epochs]
      summary: Get epoch countdown info
      responses:
        '200':
          description: Countdown data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochCountdownDto' }

  /api/epoch/{epoch}:
    get:
      tags: [Epochs]
      summary: Get epoch statistics
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Epoch stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochStatsDto' }

  /api/epoch/{epoch}/transfers-by-type:
    get:
      tags: [Epochs]
      summary: Get transfers grouped by type for an epoch
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Transfer type breakdown
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EpochTransferByTypeDto' }

  /api/epoch/{epoch}/rewards:
    get:
      tags: [Epochs]
      summary: Get epoch rewards
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Epoch reward summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochRewardSummaryDto' }

  /api/epoch/{epoch}/meta:
    get:
      tags: [Epochs]
      summary: Get epoch metadata
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Epoch metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochMetaDto' }

  /api/epoch/meta:
    get:
      tags: [Epochs]
      summary: List all epoch metadata
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: Epoch metadata list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EpochMetaDto' }

  /api/epoch/meta/current:
    get:
      tags: [Epochs]
      summary: Get current epoch metadata
      responses:
        '200':
          description: Current epoch metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochMetaDto' }

  /api/epoch/{epoch}/empty-ticks:
    get:
      tags: [Epochs]
      summary: Get empty tick statistics for an epoch
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Empty tick stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochEmptyTickStatsDto' }

  /api/epoch/{epoch}/meta (POST):
    post:
      tags: [Epochs, Admin]
      summary: Upsert epoch metadata (requires admin API key)
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EpochMetaRequest' }
      responses:
        '200':
          description: Success
      security:
        - AdminApiKey: []

  /api/epoch/{epoch}/fetch-end-logs:
    post:
      tags: [Epochs, Admin]
      summary: Fetch and insert end-epoch logs (requires admin API key)
      parameters:
        - name: epoch
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Success
      security:
        - AdminApiKey: []

  /api/epoch/backfill-stats:
    post:
      tags: [Epochs, Admin]
      summary: Backfill epoch stats for completed epochs (requires admin API key)
      responses:
        '200':
          description: Success
      security:
        - AdminApiKey: []

  # ── Labels ──────────────────────────────────────────────────────────────
  /api/labels:
    get:
      tags: [Labels]
      summary: Get all known addresses with optional type filter
      parameters:
        - name: type
          in: query
          schema: { type: string }
          description: Filter by address type (e.g. smartcontract, exchange)
      responses:
        '200':
          description: Array of labelled addresses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/KnownAddressDto' }

  /api/labels/{address}:
    get:
      tags: [Labels]
      summary: Get label info for a single address
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Label info
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnownAddressDto' }

  /api/labels/batch:
    post:
      tags: [Labels]
      summary: Batch fetch labels for multiple addresses (max 100)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addresses:
                  type: array
                  items: { type: string }
                  maxItems: 100
      responses:
        '200':
          description: Array of label info
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/KnownAddressDto' }

  /api/labels/stats:
    get:
      tags: [Labels]
      summary: Get label statistics
      responses:
        '200':
          description: Label stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalLabels: { type: integer }
                  byType:
                    type: object
                    additionalProperties: { type: integer }

  /api/labels/refresh:
    post:
      tags: [Labels, Admin]
      summary: Refresh all labels from source (requires admin API key)
      responses:
        '200':
          description: Refresh result
      security:
        - AdminApiKey: []

  /api/labels/procedure/{contractAddress}/{inputType}:
    get:
      tags: [Labels]
      summary: Get procedure name for a contract input type
      parameters:
        - name: contractAddress
          in: path
          required: true
          schema: { type: string }
        - name: inputType
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Procedure info
          content:
            application/json:
              schema:
                type: object
                properties:
                  procedureName: { type: string }

  # ── Assets ──────────────────────────────────────────────────────────────
  /api/assets:
    get:
      tags: [Assets]
      summary: Get all assets from latest universe snapshot
      responses:
        '200':
          description: Array of assets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AssetSummaryDto' }

  /api/assets/{name}:
    get:
      tags: [Assets]
      summary: Get detailed asset info
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: issuer
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssetDetailDto' }

  /api/assets/{name}/holders:
    get:
      tags: [Assets]
      summary: Get paginated asset holders
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: issuer
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Paginated holders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssetHoldersPageDto' }

  # ── Stats ───────────────────────────────────────────────────────────────
  /api/stats:
    get:
      tags: [Stats]
      summary: Get network stats
      responses:
        '200':
          description: Network stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NetworkStatsDto' }

  /api/stats/chart/tx-volume:
    get:
      tags: [Stats]
      summary: Transaction volume chart data
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [day, week, month], default: day }
      responses:
        '200':
          description: Chart data points
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChartDataPointDto' }

  /api/stats/top-addresses:
    get:
      tags: [Stats]
      summary: Top addresses by volume
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: epoch
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Top addresses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TopAddressDto' }

  /api/stats/rich-list:
    get:
      tags: [Stats]
      summary: Rich list with pagination
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Rich list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RichListDto' }

  /api/stats/supply:
    get:
      tags: [Stats]
      summary: Supply dashboard
      responses:
        '200':
          description: Supply info
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplyDashboardDto' }

  /api/stats/whale-alerts:
    get:
      tags: [Stats]
      summary: Large transfer alerts
      parameters:
        - name: threshold
          in: query
          schema: { type: integer, format: uint64, default: 10000000000 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Whale alerts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WhaleAlertDto' }

  /api/stats/smart-contract-usage:
    get:
      tags: [Stats]
      summary: Smart contract usage stats
      parameters:
        - name: epoch
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: SC usage
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SmartContractUsageDto' }

  /api/stats/active-addresses:
    get:
      tags: [Stats]
      summary: Active address trends
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [epoch, day], default: epoch }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Active address trends
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ActiveAddressTrendDto' }

  /api/stats/new-vs-returning:
    get:
      tags: [Stats]
      summary: New vs returning addresses per epoch
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: New vs returning
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NewVsReturningDto' }

  /api/stats/exchange-flows:
    get:
      tags: [Stats]
      summary: Exchange inflow/outflow data
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Exchange flows
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExchangeFlowDto' }

  /api/stats/exchange-senders:
    get:
      tags: [Stats]
      summary: Addresses sending to exchanges
      parameters:
        - name: epochs
          in: query
          schema: { type: integer, default: 5 }
        - name: minAmount
          in: query
          schema: { type: integer, format: uint64, default: 1000000000 }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
        - name: depth
          in: query
          schema: { type: integer, default: 1 }
      responses:
        '200':
          description: Exchange senders
          content:
