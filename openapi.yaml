        originAddress: { type: string }
        hopLevel: { type: integer }

    CustomFlowResultDto:
      type: object
      properties:
        job: { $ref: '#/components/schemas/CustomFlowJobDto' }
        nodes:
          type: array
          items: { $ref: '#/components/schemas/FlowVisualizationNodeDto' }
        links:
          type: array
          items: { $ref: '#/components/schemas/FlowVisualizationLinkDto' }
        maxDepth: { type: integer }
        totalTrackedVolume: { type: number }

    CustomFlowTrackingStateDto:
      type: object
      properties:
        jobId: { type: string }
        address: { type: string }
        addressType: { type: string }
        originAddress: { type: string }
        receivedAmount: { type: number }
        sentAmount: { type: number }
        pendingAmount: { type: number }
        hopLevel: { type: integer }
        lastTick: { type: integer, format: uint64 }
        isTerminal: { type: boolean }
        isComplete: { type: boolean }

    # ── Notifications ───────────────────────────────────────────────────────
    PushSubscribeRequest:
      type: object
      required: [subscription, addresses]
      properties:
        subscription: { $ref: '#/components/schemas/PushSubscriptionData' }
        addresses:
          type: array
          items: { type: string }
        events:
          type: array
          nullable: true
          items: { type: string }
        largeTransferThreshold: { type: integer, format: uint64, default: 1000000000 }
        balanceMinThreshold: { type: integer, format: uint64, default: 0 }
        balanceMaxThreshold: { type: integer, format: uint64, default: 0 }

    PushSubscriptionData:
      type: object
      properties:
        endpoint: { type: string }
        keys: { $ref: '#/components/schemas/PushSubscriptionKeys' }

    PushSubscriptionKeys:
      type: object
      properties:
        p256dh: { type: string }
        auth: { type: string }

    PushUnsubscribeRequest:
      type: object
      required: [endpoint]
      properties:
        endpoint: { type: string }
