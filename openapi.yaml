# ════════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-Api-Key

  schemas:
    # ── Pagination ──────────────────────────────────────────────────────────
    PaginatedTransactionResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/TransactionDto' }
        page: { type: integer }
        limit: { type: integer }
        totalCount: { type: integer, format: int64 }
        totalPages: { type: integer }
        hasNextPage: { type: boolean }
        hasPreviousPage: { type: boolean }

    PaginatedTransferResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/TransferDto' }
        page: { type: integer }
        limit: { type: integer }
        totalCount: { type: integer, format: int64 }
        totalPages: { type: integer }
        hasNextPage: { type: boolean }
        hasPreviousPage: { type: boolean }

    PaginatedTickResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/TickDto' }
        page: { type: integer }
        limit: { type: integer }
        totalCount: { type: integer, format: int64 }
        totalPages: { type: integer }
        hasNextPage: { type: boolean }
        hasPreviousPage: { type: boolean }

    PaginatedRewardDistributionResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/RewardDistributionDto' }
        page: { type: integer }
        limit: { type: integer }
        totalCount: { type: integer, format: int64 }
        totalPages: { type: integer }
        hasNextPage: { type: boolean }
        hasPreviousPage: { type: boolean }

    # ── Search ──────────────────────────────────────────────────────────────
    SearchResponse:
      type: object
      properties:
        query: { type: string }
        results:
          type: array
          items: { $ref: '#/components/schemas/SearchResultDto' }

    SearchResultDto:
      type: object
      properties:
        type:
          type: string
          enum: [Tick, Transaction, Address, Asset]
        value: { type: string }
        displayName: { type: string, nullable: true }

    # ── Transaction ─────────────────────────────────────────────────────────
    TransactionDto:
      type: object
      properties:
        hash: { type: string }
        tickNumber: { type: integer, format: uint64 }
        epoch: { type: integer }
        fromAddress: { type: string }
        toAddress: { type: string }
        amount: { type: integer, format: uint64 }
        inputType: { type: integer }
        inputTypeName: { type: string, nullable: true }
        executed: { type: boolean }
        timestamp: { type: string, format: date-time }

    TransactionDetailDto:
      type: object
      properties:
        hash: { type: string }
        tickNumber: { type: integer, format: uint64 }
        epoch: { type: integer }
        fromAddress: { type: string }
        toAddress: { type: string }
        amount: { type: integer, format: uint64 }
        inputType: { type: integer }
        inputTypeName: { type: string, nullable: true }
        inputData: { type: string, nullable: true }
        parsedInput:
          nullable: true
          type: object
          description: Parsed input data (polymorphic, depends on inputType)
        executed: { type: boolean }
        timestamp: { type: string, format: date-time }
        logs:
          type: array
          items: { $ref: '#/components/schemas/LogDto' }

    SpecialTransactionDto:
      type: object
      properties:
        txHash: { type: string }
        specialType: { type: string }
        specialTypeName: { type: string }
        tickNumber: { type: integer, format: uint64 }
        timestamp: { type: string, format: date-time }
        logs:
          type: array
          items: { $ref: '#/components/schemas/LogDto' }

    # ── Transfer / Log ──────────────────────────────────────────────────────
    LogDto:
      type: object
      properties:
        tickNumber: { type: integer, format: uint64 }
        logId: { type: integer }
        logType: { type: integer }
        logTypeName: { type: string }
        txHash: { type: string, nullable: true }
        sourceAddress: { type: string, nullable: true }
        destAddress: { type: string, nullable: true }
        amount: { type: integer, format: uint64 }
        assetName: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

    TransferDto:
      type: object
      properties:
        tickNumber: { type: integer, format: uint64 }
        epoch: { type: integer }
        logId: { type: integer }
        logType: { type: integer }
        logTypeName: { type: string }
        txHash: { type: string, nullable: true }
        sourceAddress: { type: string }
        destAddress: { type: string }
        amount: { type: integer, format: uint64 }
        assetName: { type: string, nullable: true }
        timestamp: { type: string, format: date-time }

    # ── Tick ────────────────────────────────────────────────────────────────
    TickDto:
      type: object
      properties:
        tickNumber: { type: integer, format: uint64 }
        epoch: { type: integer }
        timestamp: { type: string, format: date-time }
        txCount: { type: integer }
        logCount: { type: integer }
        isEmpty: { type: boolean }

    TickDetailDto:
      type: object
      properties:
        tickNumber: { type: integer, format: uint64 }
        epoch: { type: integer }
        timestamp: { type: string, format: date-time }
        txCount: { type: integer }
        logCount: { type: integer }
        isEmpty: { type: boolean }
        transactions:
          type: array
          items: { $ref: '#/components/schemas/TransactionDto' }

    # ── Address ─────────────────────────────────────────────────────────────
    AddressDto:
      type: object
      properties:
        address: { type: string }
        balance: { type: integer, format: uint64 }
        incomingAmount: { type: integer, format: uint64 }
        outgoingAmount: { type: integer, format: uint64 }
        txCount: { type: integer }
        transferCount: { type: integer }

    AddressActivityRangeDto:
      type: object
      properties:
        firstTick: { type: integer, format: uint64, nullable: true }
        firstTimestamp: { type: string, format: date-time, nullable: true }
        firstEpoch: { type: integer, nullable: true }
        lastTick: { type: integer, format: uint64, nullable: true }
        lastTimestamp: { type: string, format: date-time, nullable: true }
        lastEpoch: { type: integer, nullable: true }

    AddressFlowDto:
      type: object
      properties:
        address: { type: string }
        label: { type: string, nullable: true }
        type: { type: string, nullable: true }
        inbound:
          type: array
          items: { $ref: '#/components/schemas/FlowNodeDto' }
        outbound:
          type: array
          items: { $ref: '#/components/schemas/FlowNodeDto' }

    FlowNodeDto:
      type: object
      properties:
        address: { type: string }
        label: { type: string, nullable: true }
        type: { type: string, nullable: true }
        totalAmount: { type: integer, format: uint64 }
        transactionCount: { type: integer }

    TransactionGraphDto:
      type: object
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/GraphNodeDto' }
        links:
          type: array
          items: { $ref: '#/components/schemas/GraphLinkDto' }

    GraphNodeDto:
      type: object
      properties:
        address: { type: string }
        label: { type: string, nullable: true }
        type: { type: string, nullable: true }
        totalVolume: { type: number }
        depth: { type: integer }

    GraphLinkDto:
      type: object
      properties:
        source: { type: string }
        target: { type: string }
        amount: { type: number }
        txCount: { type: integer }

    BatchAddressRequest:
      type: object
      properties:
        addresses:
          type: array
          items: { type: string }
          maxItems: 20

    # ── Labels ──────────────────────────────────────────────────────────────
    KnownAddressDto:
      type: object
      properties:
        address: { type: string }
        label: { type: string, nullable: true }
        type: { type: string, nullable: true }
        contractIndex: { type: integer, nullable: true }

    # ── Epoch ───────────────────────────────────────────────────────────────
    EpochStatsDto:
      type: object
      properties:
        epoch: { type: integer }
        tickCount: { type: integer, format: uint64 }
        emptyTickCount: { type: integer, format: uint64 }
        firstTick: { type: integer, format: uint64 }
        lastTick: { type: integer, format: uint64 }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        txCount: { type: integer, format: uint64 }
        totalVolume: { type: number }
        uniqueSenders: { type: integer, format: uint64 }
        uniqueReceivers: { type: integer, format: uint64 }
        activeAddresses: { type: integer, format: uint64 }
        transferCount: { type: integer, format: uint64 }
        quTransferred: { type: number }
        assetTransferCount: { type: integer, format: uint64 }

    EpochSummaryDto:
      type: object
      properties:
        epoch: { type: integer }
        tickCount: { type: integer, format: uint64 }
        emptyTickCount: { type: integer, format: uint64 }
        txCount: { type: integer, format: uint64 }
        totalVolume: { type: number }
        activeAddresses: { type: integer, format: uint64 }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        firstTick: { type: integer, format: uint64 }
        lastTick: { type: integer, format: uint64 }

    EpochTransferByTypeDto:
      type: object
      properties:
        epoch: { type: integer }
        logType: { type: integer }
        logTypeName: { type: string }
        count: { type: integer, format: uint64 }
        totalAmount: { type: number }

    EpochCountdownDto:
      type: object
      properties:
        currentEpoch: { type: integer }
        currentEpochStart: { type: string, format: date-time }
        averageEpochDurationMs: { type: number }
        estimatedEpochEnd: { type: string, format: date-time }
        currentTick: { type: integer, format: uint64 }

    EpochMetaDto:
      type: object
      properties:
        epoch: { type: integer }
        initialTick: { type: integer, format: uint64 }
        endTick: { type: integer, format: uint64 }
        endTickStartLogId: { type: integer, format: uint64 }
        endTickEndLogId: { type: integer, format: uint64 }
        isComplete: { type: boolean }
        updatedAt: { type: string, format: date-time }
